name: CI Pipeline - Cypress E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar orquestração e testes (Docker Compose)
        run: npm run docker:run

      - name: Salvar Relatórios de Teste (Artifacts)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cypress-html
          path: cypress/reports/html/